# Conda environment for pyICESHEET development.
#   conda env create -f environment.yml
#   conda activate pyicesheet
#   pip install -e ".[gis,bmi,test]"
name: pyicesheet
channels:
  - conda-forge
dependencies:
  - python>=3.10
  - numpy>=1.23
  - scipy>=1.9
  - shapely>=2.0
  - rasterio>=1.3
  - geopandas>=0.12
  - pytest>=7.0
  - pip
  - pip:
      - bmipy>=2.0
